<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Wood's Sooper Dooper Shop, the best Quidditch Gear in the wizarding world! 
    Perfect for beginners, professionals and schools. Keep up with the lastest Quidditch sports news with our magazin!"
    />
    <title>Wood's Sooper Dooper Shop | Booking Form</title>

    <!-- favicons generated by favicon.io -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./assets/images/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="./assets/images/favicon-16x16.png"
    />
    <link rel="manifest" href="./assets/images/site.webmanifest" />

    <!-- Bootstrip CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!-- CSS styles -->
    <link rel="stylesheet" href="../woods-sooper-dooper-shop/assets/css/styles.css" />
  </head>

  <!-- works with the footer to ensure it stays at the bottom -->
  <body class="d-flex flex-column min-vh-100">
    <!-- Navigation -->
    <nav id="navbar" class="navbar navbar-expand-lg" data-bs-theme="dark">
      <div class="container">
        <a class="navbar-brand" href="index.html"
          ><img
            class="logo"
            src="./assets/images/apple-touch-icon.png"
            alt="Wood's Sooper Dooper Shop Logo"
          /><span class="logo-text"> Wood's</span></a
        >
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="index.html#products">Products</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="shop.html">Shop</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="index.html#footer">Contact</a>
            </li>
            <li class="nav-item">
              <a class="btn booking-button ms-lg-3" aria-current="page" href="form.html"
                >Book now</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- no header here, as I think it's completly unnecessary and doesn't add anyting -->

    <!-- Name, Address, e-mail, radio: Tour - Magazin, checkbox - delivery -->
    <main>
      <!-- Form -->
      <section id="form" class="container section">
        <div class="row justify-content-center">
          <div class="col-12 col-md-8">
            <!-- Form Heading -->
            <h2 class="display-5 text-center">Wood's</h2>
            <form action="success.html" method="get">
              <div class="row">
                <!-- text -->
                <div class="col-12 col-lg-6 mb-3">
                  <label for="name" class="form-label">Name</label>
                  <input class="form-control" id="name" name="name" type="text" required/>
                </div>
                <!-- email -->
                <div class="col-12 col-lg-6 mb-3">
                  <label for="email" class="form-label">Email</label>
                  <input class="form-control" id="email" name="email" type="email" required/>
                </div>
                <!-- number -->
                <div class="col-12 col-lg-6 mb-3">
                  <label for="phone-number" class="form-label">Phone Number</label>
                  <input class="form-control" id="phone-number" name="phone-number" type="number" required/>
                </div>

                <!-- services radio -->
                <div class="col-12 col-lg-6 mb-3">
                  <label for="magazin" class="form-label">
                    Services
                  </label>
                  <div class="form-check">
                    <input class="form-check-input" type="radio" name="services" id="magazin" value="magazin" checked>
                    <label class="form-check-label" for="magazin">
                      Magazin
                    </label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="radio" name="services" id="tour" value="tour">
                    <label class="form-check-label" for="tour">
                      Tour
                    </label>
                  </div>
                </div>

                <!-- Delivery Method - select one -->
                <div class="col-12 col-lg-6 mb-3">
                  <label for="delivery-type" class="form-label">Delivery Method</label>
                  <select id="delivery-type" class="form-select" name="delivery-type" required>
                    <option value="" selected>Select</option>
                    <option value="owl">Owl</option>
                    <option value="mail">Mail</option>
                    <option value="porter">Porter</option>
                  </select>
                </div>
                <div class="col-12 mb-3">
                  <label for="message" class="form-label">Message</label>
                  <textarea
                    class="form-control"
                    rows="6"
                    id="message"
                    name="message" required
                  ></textarea>
                </div>
              </div>
              <button type="submit" class="btn booking-button-borderline" >Submit</button>
            </form>
          </div>
        </div>
      </section>
    </main>

  <!-- contact section -->
  <footer id="footer" class="mt-auto">
    <div class="container section">
      <div class="row justify-content-evenly">
        <!-- Contact Us Heading -->
        <div class="col-12 text-center">
          <h2 class="display-5">Welcome</h2>
        </div>
        <!-- Contact info -->
        <div class="col-12 col-md-6 col-xl-4">
          <h3>Location and Contact Info</h3>
          <address>
            <i class="fa-solid fa-location-dot"></i
            ><strong> Wood's Sooper Dooper Shop</strong><br/>
            Very Good Street 123<br />
            Hogwarts Grounds 1200
          </address>
          <p>
            <i class="fa-solid fa-phone"></i> 012 0800 0800<br/>
            <i class="fa-regular fa-paper-plane"></i> woods@sooper-dooper.com
          </p>
          <div class="social-links my-4">
            <a
              href="https://www.instagram.com"
              target="_blank"
              aria-label="Visit our Instagram page (opens in a new tab)"
              rel="noopener"
            >
              <i class="fa-brands fa-instagram"></i>
            </a>
            <a
              href="https://www.facebook.com"
              target="_blank"
              aria-label="Visit our Facebook page (opens in a new tab)"
              rel="noopener"
            >
              <i class="fa-brands fa-square-facebook"></i>
            </a>
            <a
              href="https://x.com"
              target="_blank"
              aria-label="Visit our X page (opens in a new tab)"
              rel="noopener"
            >
              <i class="fa-brands fa-x-twitter"></i>
            </a>
            <a
              href="https://youtube.com"
              target="_blank"
              aria-label="Visit our YouTube page (opens in a new tab)"
              rel="noopener"
            >
              <i class="fa-brands fa-youtube"></i>
            </a>
            <a
              href="https://linkedin.com"
              target="_blank"
              aria-label="Visit our Linked-In page (opens in a new tab)"
              rel="noopener"
            >
              <i class="fa-brands fa-linkedin"></i>
            </a>
          </div>
        </div>

        <!-- Opening times -->
        <div class="col-12 col-md-6 col-xl-4">
          <h3>Opening Hours</h3>
          <table class="table table-striped table-dark">
            <tbody>
              <tr>
                <th scope="row">Mon - Tues</th>
                <td>8am</td>
                <td>5pm</td>
              </tr>
              <tr>
                <th scope="row">Wed - Thur</th>
                <td>9am</td>
                <td>5pm</td>
              </tr>
              <tr>
                <th scope="row">Fri - Sat</th>
                <td>11am</td>
                <td>4pm</td>
              </tr>
              <tr>
                <th scope="row">Sun</th>
                <td colspan="2">Closed</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </footer>

  <!-- Font Awesome -->
  <script
    src="https://kit.fontawesome.com/1738b2b29a.js"
    crossorigin="anonymous"
  ></script>

  <!-- Bootstrip JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"
  ></script>
  </body>
</html>
